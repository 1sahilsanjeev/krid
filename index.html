<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krid</title>
  <style>
    /* Critical dark-mode CSS — loaded before React to prevent white flash */
    html.dark,
    html.dark body,
    html.dark #root {
      background-color: #111111 !important;
      color: #e5e5e5;
    }
  </style>
  <script>
    // Apply dark class before first paint
    try {
      var s = JSON.parse(localStorage.getItem('canvas-storage') || '{}');
      var t = s && s.state && s.state.appTheme;
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    } catch (e) { }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
